title: GitHub Store
description: The app store for GitHub releases
url: https://github-store.org
locale: en_US

author:
  name: Usmon Narzullayev
  url: https://github.com/rainxchzed
  twitter: rainxch_zed

social:
  twitter: rainxch_zed

logo: /android-chrome-512x512.png

include:
  - .well-known
  - admin

# Blog collection (folder name `_news` kept for backwards-compat with Decap CMS)
collections:
  news:
    output: true
    permalink: /blog/:slug/
    sort_by: date

defaults:
  - scope:
      path: ""
      type: news
    values:
      layout: news_post

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
permalink: pretty

plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

# Sitemap exclusions
sitemap:
  file: "/sitemap.xml"

# Exclude from build
exclude:
  - README.md
  - LICENSE
  - .DS_Store
  - "*.bak"
  - Gemfile
  - Gemfile.lock
  - vendor
  - .brain
