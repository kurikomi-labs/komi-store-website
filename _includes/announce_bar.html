<aside class="announce-bar" id="announceBar" role="region" aria-label="Keep Android Open warning">
    <div class="announce-bar__inner container">
        <svg class="announce-bar__icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
            <path d="M12 2.5 0.8 22h22.4L12 2.5zm0 5L19.7 20H4.3L12 7.5zm-1 4.5v5h2v-5h-2zm0 6v2h2v-2h-2z"/>
        </svg>
        <p class="announce-bar__text">
            <span class="announce-bar__brand">Keep Android Open</span>
            <span class="announce-bar__verify">— Google enforces developer verification in</span>
        </p>
        <span class="announce-bar__count" id="kaoCountdown" data-target="2026-09-01T00:00:00Z">soon</span>
        <a href="/blog/keep-android-open/" class="announce-bar__cta" aria-label="Read why this matters">
            <span class="announce-bar__cta__label">Read why</span>
            <span class="announce-bar__cta__arrow" aria-hidden="true">→</span>
        </a>
        <button class="announce-bar__close" id="announceClose" type="button" aria-label="Dismiss announcement">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
    </div>
</aside>
<script>
(function() {
    var bar = document.getElementById('announceBar');
    var body = document.body;
    var KEY = 'kao-dismissed';
    if (bar && localStorage.getItem(KEY) === '1') {
        bar.remove();
        body.classList.remove('has-announce');
        return;
    }
    var closeBtn = document.getElementById('announceClose');
    if (closeBtn && bar) {
        closeBtn.addEventListener('click', function() {
            localStorage.setItem(KEY, '1');
            bar.remove();
            body.classList.remove('has-announce');
        });
    }
    var el = document.getElementById('kaoCountdown');
    if (!el) return;
    var target = new Date(el.dataset.target).getTime();
    function fmt(n) { return n < 10 ? '0' + n : '' + n; }
    function tick() {
        var diff = target - Date.now();
        if (diff <= 0) { el.textContent = 'now'; return; }
        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        el.textContent = d + 'd ' + fmt(h) + 'h ' + fmt(m) + 'm';
        setTimeout(tick, 30000);
    }
    tick();
})();
</script>
